<!DOCTYPE html>
<html>
<head>
    <title>Exercise 2</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        $(document).ready(function () {
            var row = 0;
            var rows = $("tbody tr");

            // Highlight the next row
            $("#next").click(function () {
                rows.css("color", "black");
                rows.eq(row).css("color", "red");
                row++;

                // Go back to the first row
                if (row == rows.length) {
                    row = 0;
                }
            });

            // Remove the highlight
            $("#clear").click(function () {
                rows.css("color", "black");
                row = 0;
            });
        });
    </script>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Phone</th>

            </tr>

        </tbody>
    </table>

    <br>

</body>
</html>
