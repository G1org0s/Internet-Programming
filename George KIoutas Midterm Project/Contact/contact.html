<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact the Fish The.Box team">
    <meta name="author" content="George Kioutas">
    <title>Fish The.Box / Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"rel="stylesheet">
    <link rel="stylesheet" href="styles contact.css">
    <link rel="stylesheet" href="../DarkMode/DarkMode.css">
    <script src="../DarkMode/DarkMode.js" defer></script>
    <script src="../Other Scripts/Navbar/navbar.js" defer></script>
    <script src="script contact.js" defer></script>
</head>

<body>

    <!-- Header with the logo and shared navigation -->


    <header class="bg-info text-white sticky-top">
        <div class="container py-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <img src="../Photos/logo.png"
                     alt="Fish The.Box logo"
                     width="150"
                     height="120">

                <div id="navbar"></div>
            </div>
        </div>
    </header>

    <main>

        <!-- Contact form section -->

        
        <section class="contact-section py-5">
            <div class="container">
                <h1 class="text-center fw-bold mb-2">Contact Us</h1>

                <p class="text-center mb-5">
                    Send us your questions, ideas, or feedback about Fish The.Box.
                </p>

                <div class="row g-4">

                    <!-- Contact form -->



                    <div class="col-lg-6">
                        <div class="card h-100 shadow p-4">
                            <h2 class="h4 fw-bold mb-4">Send a Message</h2>

                            <!-- HTML checks the fields before JavaScript shows the pop-up. -->



                            <form id="contactForm">

                                <!-- User name -->


                                <div class="mb-3">
                                    <label for="contactName" class="form-label">
                                        Name
                                    </label>

                                    <input type="text"
                                           id="contactName"
                                           name="name"
                                           class="form-control"
                                           placeholder="Enter your name"
                                           minlength="2"
                                           maxlength="50"
                                           required>
                                </div>

                                <!-- User email -->


                                <div class="mb-3">
                                    <label for="contactEmail" class="form-label">
                                        Email
                                    </label>

                                    <input type="email"
                                           id="contactEmail"
                                           name="email"
                                           class="form-control"
                                           placeholder="Enter your email"
                                           maxlength="100"
                                           required>
                                </div>

                                <!-- Message subject -->


                                <div class="mb-3">
                                    <label for="contactSubject" class="form-label">
                                        Subject
                                    </label>

                                    <input type="text"
                                           id="contactSubject"
                                           name="subject"
                                           class="form-control"
                                           placeholder="Enter the subject"
                                           minlength="3"
                                           maxlength="80"
                                           required>
                                </div>

                                <!-- User message -->


                                <div class="mb-3">
                                    <label for="contactMessage" class="form-label">
                                        Message
                                    </label>

                                    <textarea id="contactMessage"
                                              name="message"
                                              class="form-control"
                                              rows="5"
                                              placeholder="Write your message"
                                              minlength="10"
                                              maxlength="500"
                                              required>
                                    </textarea>
                                </div>

                                <!-- Submit button -->


                                <button type="submit" class="btn btn-info w-100">
                                    Send Message
                                </button>

                            </form>
                        </div>
                    </div>

                    <!-- Contact information and social media -->



                    <div class="col-lg-6">-
                        <div class="card h-100 shadow p-5">
                            <h2 class="h4 fw-bold mb-4">Contact Information</h2>

                            <p>
                                <b>Email:</b>
                                fishthebox@example.com
                            </p>

                            <p>
                                <b>Location:</b>
                                Athens, Greece
                            </p>

                            <p>
                                <b>Follow our team on social media:</b>
                            </p>

                            <!-- Social media icon links -->

                            
                            <div class="social-links d-flex gap-3">
                                <a href="https://www.facebook.com/">
                                    <i class="bi bi-facebook"></i>
                                </a>

                                <a href="https://www.instagram.com/">
                                    <i class="bi bi-instagram"></i>
                                </a>

                                <a href="https://github.com/G1org0s/Internet-Programming.git">
                                    <i class="bi bi-github"></i>
                                </a>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>

        <!-- Google Map section -->



        <section class="map-section py-5 bg-light">
            <div class="container">
                <h2 class="text-center fw-bold mb-4">Find Us</h2>

                <!-- The frame displays an embedded Google Map -->



                <iframe class="google-map" src="https://www.google.com/maps?q=Athens,Greece&output=embed" loading="lazy"> </iframe>
            </div>
        </section>

    </main>

    <!-- Page footer -->



    <footer class="bg-light text-dark text-center py-3">
        <p class="mb-0">&copy; 2026 Fish The.Box. All rights reserved.</p>
    </footer>

</body>

</html>
