<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page information -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fish The.Box trips page">
    <meta name="author" content="George Kioutas">
    <title>Fish The.Box / Trips</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>
    <link rel="stylesheet" href="styles trips.css">
    <link rel="stylesheet" href="../DarkMode/DarkMode.css">
    <script src="../DarkMode/DarkMode.js" defer></script>
    <script src="../Other Scripts/Navbar/navbar.js" defer></script>
    <script src="../Fishing Trips/script trips.js" defer></script>
</head>

<body>

    <!-- Header with logo and navbar -->
    <header class="bg-info text-white sticky-top">
        <div class="container py-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <img src="../Photos/logo.png" alt="Fish The.Box Logo" width="150" height="120" class="d-inline-block align-top">

                <div id="navbar"></div>

</header>

    <main>

        <!-- Trip board planner -->

        <article class="trip-board-section py-5">
            <div class="container">

                <div class="trip-board card shadow-lg p-4">

                    <h1 class="text-center fw-bold mb-4">Plan the Fishing Trip</h1>

                    <form id="tripForm">

                        <div class="row g-4">

                            <!-- Trip name -->

                            <div class="col-md-6">
                                <label for="tripName" class="form-label">Trip Name</label>
                                <input type="text"
                                       class="form-control"
                                       id="tripName"
                                       placeholder="Ex. Peloponnese"
                                       required>
                            </div>

                            <!-- Trip location -->
                            <div class="col-md-6">
                                <label for="tripLocation" class="form-label">Trip Location</label>
                                <input type="text"
                                       class="form-control"
                                       id="tripLocation"
                                       placeholder="Ex. Pylos"
                                       required>
                            </div>

                            <!-- Trip date -->
                            <div class="col-md-6">
                                <label for="tripDate" class="form-label">Trip Date</label>
                                <input type="date"
                                       class="form-control"
                                       id="tripDate"
                                       required>
                            </div>

                            <!-- Trip description -->
                            <div class="col-md-6">
                                <label for="tripDescription" class="form-label">Trip Description</label>
                                <input type="text"
                                       class="form-control"
                                       id="tripDescription"
                                       placeholder="Ex. The area is known to have sea breams!"
                                       required>
                            </div>

                        </div>

                        <button type="submit"
                                class="btn btn-success text-white mt-4 w-100">
                            Save Trip
                        </button>

                    </form>

                    <!-- API result cards -->


                    <div class="row mt-4 text-center justify-content-center">
                        <div class="col-md-6">
                            <div class="card result-card">
                                <div class="card-body">
                                    <h2 class="h6">Today's Athens Weather</h2>
                                    <p id="weatherResult" class="fw-bold">-</p>
                                </div>
                            </div>
                        </div>

                    </div>

                    <!-- Menu for sorting both trip tables -->
                     
                    <div class="row justify-content-center mt-4">
                        <div class="col-md-4">
                            <label for="sortTrips" class="form-label fw-bold">
                                Sort Trips by Date
                            </label>

                            <select id="sortTrips" class="form-select">
                                <option value="earliest">Earliest First</option>
                                <option value="latest">Latest First</option>
                            </select>
                        </div>
                    </div>

                    <!-- Pending and completed trips -->

                    <div class="row g-4 mt-5">

                        <!-- Pending trips table -->


                        <div class="col-md-6">
                            <h2 class="h4 fw-bold text-center mb-3">Pending Trips</h2>

                            <div class="table-responsive">
                                <table class="table table-bordered table-hover">
                                    <thead class="table-info">
                                        <tr>
                                            <th>Trip Name</th>
                                            <th>Location</th>
                                            <th>Date</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>

                                    <tbody id="pendingTripsTable">
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Completed trips table -->


                        <div class="col-md-6">
                            <h2 class="h4 fw-bold text-center mb-3">Completed Trips</h2>

                            <div class="table-responsive">
                                <table class="table table-bordered table-hover">
                                    <thead class="table-info">
                                        <tr>
                                            <th>Trip Name</th>
                                            <th>Location</th>
                                            <th>Date</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>

                                    <tbody id="completedTripsTable"> </tbody>
                                </table>
                            </div>
                        </div>

                    </div>

                </div>

            </div>
        </article>

    </main>

    <footer class="bg-light text-dark text-center py-3">
        <p class="mb-0">&copy; 2026 Fish The.Box. All rights reserved.</p>
    </footer>

</body>
</html>
