<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fish The.Box trips page">
    <meta name="George Kioutas" content="Fishing trip manager page for Fish The.Box">
    <title>Fish The.Box / Trips</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles trips.css">
    <link rel="stylesheet" href="../DarkMode/DarkMode.css">
    <script src="../DarkMode/DarkMode.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="../Other Scripts/Navbar/navbar.js " defer></script>
    <script src="../Fishing Trips/script trips.js" defer></script>
</head>

<body>



    <!-- Header with logo, a short description -->

    <header class="bg-info text-white sticky-top">
        <div class="container py-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <img src="../Photos/logo.png" alt="Fish The.Box Logo" width="150" height="120" class="d-inline-block align-top">

        <!-- Calling the navbar -->   
             
        <div id="navbar"></div>
    </header>

    <body>
            
     
       <!-- Calling the navbar script  -->
        
        <script src="../Other Scripts/Navbar/navbar.js"></script>



        <!-- Trip Board Planner-->


        <article class="trip-board-section py-5"

            <div class="container">
                <div class="trip-board card shadow-lg p-4"
                
                    <h1 class="text-center fw-bold mb-4">Plan the Fishing Trip</h1>

                        <form id="tripForm"

                            

                        
                            <div class="col-md-6">

                                <label for="tripName" class="form-label">Trip Name</label>
                                <input type="text" class="form-control" id="tripName" placeholder="Ex. Peloponese" required>
                            </div>


                            <!-- This is for the location of the Trip -->


                            <div class="col-md-6">

                                <label for="tripLocation" class="form-label">Trip Location</label>
                                <input type="text" class="form-control" id="tripLocation" placeholder="Ex. Pylos" required>



                                <!-- This is for the Date of the Trip -->

                                <div class="col-md-6">
                                    <label for="tripDate" class="form-label">Trip Date</label>
                                    <input type="date" class="form-control" id="tripDate" required>
                                </div>

                            <!-- This is for the trip description -->


                            <div class="col-md-6">


                                <label for="tripDescription" class="form-label">Trip Description</label>
                                <input type="text" class="form-control" id="tripDescription" placeholder="Ex. The area is known to have sea breams!" required>

                            </div>


                            <!-- Button to check conditions -->


                            <button id="checkConditionsBtn" type="button" class="btn btn-info mt-4 w-100">Check Conditions</button>
                        </form>


                        <!-- The result of the APIs for fishing conditions -->


                        <div class="row g-4 mt-4 text-center">
                        

                            <!-- For Weather results -->




                                <div class="col-md-3">
                                        <div class="card result-card">
                                            <div class="card-body"
                                                <h2 class="h6">Weather</h2>
                                                <p id="weatherResult" class="fw-bold">-</p>
                                            </div>
                                        </div>
                                </div>
                                


                                <!-- For solunar phase  results -->

                                
                                <div class="col-md-3">
                                    <div class="card result-card"
                                        <div class="card-body">
                                            <h2 class="h6">Solunar Phase</h2>
                                            <p id="solunarResult" class="fw-bold">-</p>
                                        </div>
                                            
                                </div>

                            <!-- For wind results -->

                                <div class="col-md-3">
                                        <div class="card result-card">
                                            <div class="card-body">
                                                <h2 class="h6">Wind</h2>
                                                <p id="windResult" class="fw-bold">-</p>
                                            </div>
                                        </div>
                                </div>


                                <!-- For if the day is good to go fishing or not results -->


                                <div class="col-md-3">
                                        <div class="card result-card">
                                            <div class="card-body">
                                                <h2 class="h6">Fishing Rating</h2>
                                                <p id="ratingResult" class="fw-bold">-</p>
                                            </div>
                                        </div>


                        </div>
                 
                   
                </div>
            </div>



    <footer class="bg-light text-dark text-center py-3">
        <p class="mb-0">&copy; 2026 Fish The.Box. All rights reserved.</p>
    </footer>

</body>
</html>
